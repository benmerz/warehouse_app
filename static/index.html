<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Warehouse Inventory Viewer</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main class="page">
		<header class="hero">
			<p class="eyebrow">Warehouse App</p>
			<h1>Inventory Database Viewer</h1>
			<p class="subtitle">View, add, edit, and delete inventory records. Register a user account and log in to get started.</p>
			<div class="actions">
				<button id="refresh-btn" type="button">Refresh</button>
				<span id="status" aria-live="polite">Loading inventory...</span>
			</div>
		</header>

		<section class="form-section" aria-label="Log in to your account">
			<h2>Login</h2>
			<form id="login-form">
				<div class="form-grid auth-grid">
					<label>Username<input name="username" autocomplete="username" required></label>
					<label>Password<input name="password" type="password" autocomplete="current-password" required></label>
				</div>
				<div class="form-actions">
					<button id="login-submit-btn" type="submit">Log In</button>
					<span id="login-status" aria-live="polite"></span>
				</div>
			</form>
		</section>

		<section class="form-section" aria-label="Register a user account">
			<h2>Register User</h2>
			<form id="register-form">
				<div class="form-grid register-grid">
					<label>Username<input name="username" autocomplete="username" required></label>
					<label>Password<input name="password" type="password" autocomplete="new-password" minlength="6" required></label>
				</div>
				<div class="form-actions">
					<button id="register-submit-btn" type="submit">Create Account</button>
					<span id="register-status" aria-live="polite"></span>
				</div>
			</form>
		</section>

		<section class="form-section hidden" id="inventory-form-section" aria-label="Add inventory record">
			<h2 id="form-title">Add Record</h2>
			<form id="add-record-form">
				<div class="form-grid">
					<label>SKU<input name="sku" required></label>
					<label>Product Name<input name="product_name" required></label>
					<label>Sport<input name="sport" required></label>
					<label>Category<input name="category" required></label>
					<label>Brand<input name="brand"></label>
					<label>Warehouse Zone<input name="warehouse_zone" required></label>
					<label>Aisle<input name="aisle" required></label>
					<label>Shelf<input name="shelf" required></label>
					<label>Bin<input name="bin" required></label>
					<label>Quantity On Hand<input name="quantity_on_hand" type="number" min="0" required></label>
					<label>Quantity Reserved<input name="quantity_reserved" type="number" min="0" required></label>
					<label>Unit Cost<input name="unit_cost" type="number" min="0" step="0.01" required></label>
					<label>Unit Price<input name="unit_price" type="number" min="0" step="0.01" required></label>
					<label>Reorder Level<input name="reorder_level" type="number" min="0" required></label>
				</div>
				<div class="form-actions">
					<button id="submit-btn" type="submit">Add Record</button>
					<button id="cancel-edit-btn" class="btn-secondary hidden" type="button">Cancel Edit</button>
					<span id="form-status" aria-live="polite"></span>
				</div>
			</form>
		</section>

		<section class="table-section hidden" id="inventory-table-section" aria-label="Inventory data">
			<div class="table-wrap">
				<table id="inventory-table">
					<thead id="inventory-head"></thead>
					<tbody id="inventory-body"></tbody>
				</table>
			</div>
			<p id="empty-state" class="hidden">No inventory rows found.</p>
			<p id="error-state" class="hidden" role="alert"></p>
		</section>
	</main>

	<script src="/script.js" defer></script>
</body>
</html>
